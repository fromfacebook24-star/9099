.language-flag { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; flex-shrink: 0; } .language-name { font-weight: 600; font-size: 16px; color: #1a1a1a; text-align: left; } .language-code { font-size: 13px; color: #5f6368; margin-top: 2px; text-align: left; } .language-confirm-btn { padding: 16px 30px; background: linear-gradient(135deg, #1877f2, #42b72a); color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; width: 100%; position: relative; overflow: hidden; } .language-confirm-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); transition: 0.5s; } .language-confirm-btn:hover::before { left: 100%; } .language-confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(24, 119, 242, 0.4); } .language-confirm-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; } .language-confirm-btn:disabled:hover::before { left: -100%; }
